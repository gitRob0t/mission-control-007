<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mission Control">
<title>Mission Control — 007 First Light</title>
<style>
:root{color-scheme:dark;--bg:#090909;--surface:#121212;--surface-2:#191919;--text:#f5f2e9;--muted:#9d9990;--gold:#c8aa64;--gold-2:#e1ca8c;--line:#2b2b2b;--shadow:0 18px 44px rgba(0,0,0,.34)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}body{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;padding:max(14px,env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom))}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}#app{max-width:620px;margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{color:var(--gold);font-weight:900;letter-spacing:.17em;font-size:12px}.icon-button{color:var(--muted);background:transparent;border:0;padding:8px;border-radius:10px}.tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px}.tabs::-webkit-scrollbar{display:none}.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);padding:10px 13px;border-radius:999px;white-space:nowrap}.tab.active{background:var(--gold);color:#111;border-color:var(--gold);font-weight:850}.hero{margin:8px 0 12px}.kicker{color:var(--gold);font-size:11px;letter-spacing:.16em;font-weight:850;text-transform:uppercase}h1{font-size:31px;line-height:1.02;margin:6px 0;letter-spacing:-.03em}.subtitle{color:var(--muted);font-size:14px}.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.metric,.progress-card,.card,.notes{background:var(--surface);border:1px solid var(--line);border-radius:16px}.metric{padding:13px}.metric span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.metric strong{font-size:18px}.progress-card{padding:14px;margin:12px 0;box-shadow:var(--shadow)}.progress-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}.progress-head strong{font-size:17px}.progress-head span{font-size:12px;color:var(--muted)}.track{height:10px;background:#2a2a2a;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));width:0;transition:width .35s}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:12px 2px 9px}.section-label{color:var(--muted);font-size:11px;letter-spacing:.13em;text-transform:uppercase}.toolbar button{border:0;background:transparent;color:var(--gold);font-size:12px;padding:6px}.search-wrap{margin:8px 0 12px}.search{width:100%;border:1px solid var(--line);background:var(--surface);color:var(--text);padding:12px 14px;border-radius:14px;outline:none}.list{display:grid;gap:8px}.card{padding:12px;transition:opacity .25s,transform .25s,max-height .35s,padding .35s,border-width .35s}.card.done{opacity:.52}.card.hiding{opacity:0;transform:scale(.98);max-height:0!important;padding-top:0;padding-bottom:0;border-width:0;overflow:hidden}.card-head{display:grid;grid-template-columns:25px 1fr auto;gap:10px;align-items:start}.checkbox{width:22px;height:22px;accent-color:var(--gold);margin:1px 0 0}.title{font-size:16px;line-height:1.15;font-weight:850}.badge{color:var(--gold);border:1px solid #665633;border-radius:999px;padding:4px 7px;font-size:10px;white-space:nowrap}.description{margin:7px 0 0 35px;color:#cdc9c0;font-size:13px;line-height:1.38}.meta{margin:6px 0 0 35px;color:var(--muted);font-size:11px;display:flex;gap:8px;flex-wrap:wrap}.warning{margin:8px 0 0 35px;padding:9px 10px;border:1px solid #5a4725;border-radius:12px;color:#e4c887;font-size:12px;background:rgba(226,185,105,.07)}.notes{margin-top:15px;background:var(--surface-2);padding:13px 14px}.notes-title{color:var(--gold);font-size:11px;letter-spacing:.12em;font-weight:850;margin-bottom:7px}.note{color:#cbc7bd;font-size:13px;line-height:1.42;padding:4px 0}.empty{display:none;color:var(--muted);border:1px dashed var(--line);border-radius:16px;padding:18px;text-align:center}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#222;color:var(--text);border:1px solid #444;border-radius:999px;padding:10px 14px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}.toast.show{opacity:1}@media(min-width:720px){body{padding-top:28px}h1{font-size:38px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA={"missions":[{"id":"against-the-odds","number":1,"title":"Against the Odds","location":"Iceland","reward":"Iceland Outfit","challenges":[{"id":"pacifist","name":"Pacifist","description":"Finish Central Camp while taking down only the guards required to rescue the captives.","checkpoint":"Central Camp","run":"Run 1","tags":["pacifist","stealth"]},{"id":"ghost","name":"Ghost","description":"Complete Central Camp without being detected.","checkpoint":"Central Camp","run":"Run 1","tags":["ghost","stealth"]},{"id":"no-help-needed","name":"No Help Needed","description":"Complete Central Camp without using the BT-65 laptop or sabotaging the ATV.","checkpoint":"Central Camp","run":"Run 1","tags":["stealth"]},{"id":"scenic-route","name":"Scenic Route","description":"Use the zipline from the F8 rooftop toward G9.","checkpoint":"Central Camp","run":"Run 1","tags":["route"]},{"id":"00-to-become","name":"00 To Become","description":"Perform seven takedowns without being spotted.","checkpoint":"Central Camp","run":"Run 2","tags":["stealth","takedown"]},{"id":"high-ground","name":"High Ground","description":"Take down three soldiers from above.","checkpoint":"Central Camp","run":"Run 2","tags":["takedown"]},{"id":"assault","name":"Assault","description":"Win four direct fights without dying.","checkpoint":"Central Camp","run":"Run 3","tags":["assault"]},{"id":"full-of-surprises","name":"Full of Surprises","description":"Trigger both environmental distractions: the BT-65 control station and the sabotaged ATV.","checkpoint":"Central Camp","run":"Run 3","tags":["environment"]}],"notes":["Ghost, Pacifist, No Help Needed, and Scenic Route can be combined.","Completionist unlocks after the eight unique challenges are complete."]},{"id":"a-new-home","number":2,"title":"A New Home","location":"Malta","reward":"Malta Training Outfit","challenges":[{"id":"mr-mnemonic","name":"Mr Mnemonic","description":"Answer Monroe’s apartment memory game correctly on the first attempt.","checkpoint":"Home","run":"Story","tags":["dialogue","missable"]},{"id":"spinning-a-yarn","name":"Spinning a Yarn","description":"Choose Lie for all three answers during Greenway’s polygraph lesson.","checkpoint":"Polygraph Lesson","run":"Story","tags":["dialogue","missable"]},{"id":"something-to-prove","name":"Something to Prove","description":"Reach the flag in In at the Deep End without knocking down any soldier.","checkpoint":"In at the Deep End","run":"Run 1","tags":["pacifist"]},{"id":"cressidas-way","name":"Cressida’s Way","description":"Reach the flag in In at the Deep End without being detected.","checkpoint":"In at the Deep End","run":"Run 1","tags":["ghost"]},{"id":"monroes-way","name":"Monroe’s Way","description":"Take down every soldier in In at the Deep End before touching the flag.","checkpoint":"In at the Deep End","run":"Run 2","tags":["assault"]},{"id":"white-flag","name":"White Flag","description":"Reach the compound flag without taking down any soldiers.","checkpoint":"Search the Compound","run":"Run 1","tags":["pacifist"]},{"id":"always-unexpected","name":"Always Do the Unexpected","description":"Reach the compound flag without alerting anyone.","checkpoint":"Search the Compound","run":"Run 1","tags":["ghost"]},{"id":"party-crasher","name":"Party Crasher","description":"Take down every compound guard—including the basement and dock patrols—before opening the blue flag door.","checkpoint":"Search the Compound","run":"Run 2","tags":["assault"],"warning":"The challenge should appear before you touch the flag. Avoid mid-run checkpoint reloads."}],"notes":["Mr Mnemonic must be correct on the first attempt.","Something to Prove and Cressida’s Way can be combined.","Party Crasher should unlock before the flag is touched."]}]};
const P='mc:007:',H=60000,S={active:localStorage.getItem(P+'active')||DATA.missions[0].id,show:localStorage.getItem(P+'show')==='1',q:'',timers:new Map()};
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
function k(m,c){return P+'done:'+m+':'+c}function t(m,c){return P+'time:'+m+':'+c}function done(m,c){return localStorage.getItem(k(m,c))==='1'}function at(m,c){return Number(localStorage.getItem(t(m,c))||0)}function set(m,c,v){if(v){localStorage.setItem(k(m,c),'1');localStorage.setItem(t(m,c),Date.now())}else{localStorage.removeItem(k(m,c));localStorage.removeItem(t(m,c))}}
function mission(){return DATA.missions.find(m=>m.id===S.active)||DATA.missions[0]}function pct(m){return Math.round(m.challenges.filter(c=>done(m.id,c.id)).length/m.challenges.length*100)}function overall(){const a=DATA.missions.flatMap(m=>m.challenges.map(c=>[m,c]));return Math.round(a.filter(([m,c])=>done(m.id,c.id)).length/a.length*100)}function visible(m,c){const h=(c.name+' '+c.description+' '+c.checkpoint+' '+c.run+' '+(c.tags||[]).join(' ')).toLowerCase();if(S.q&&!h.includes(S.q.toLowerCase()))return false;if(!done(m.id,c.id)||S.show)return true;return Date.now()-at(m.id,c.id)<H}
function card(m,c){const d=done(m.id,c.id),hide=d&&!S.show&&Date.now()-at(m.id,c.id)>=H;return `<article class="card ${d?'done':''} ${hide?'hiding':''}" data-card="${c.id}"><div class="card-head"><input class="checkbox" type="checkbox" data-challenge="${c.id}" ${d?'checked':''}><div class="title">${c.name}</div><div class="badge">${c.run}</div></div><div class="description">${c.description}</div><div class="meta"><span>${c.checkpoint}</span>${(c.tags||[]).slice(0,2).map(x=>`<span>• ${x}</span>`).join('')}</div>${c.warning?`<div class="warning">${c.warning}</div>`:''}</article>`}
function html(){const m=mission(),n=m.challenges.filter(c=>done(m.id,c.id)).length,p=pct(m),f=m.challenges.filter(c=>visible(m,c));return `<div class="topbar"><div class="brand">MISSION CONTROL</div><button class="icon-button" id="reset">Reset</button></div><div class="tabs">${DATA.missions.map(x=>`<button class="tab ${x.id===m.id?'active':''}" data-mission="${x.id}">${x.title}</button>`).join('')}</div><div class="hero"><div class="kicker">Mission ${m.number} • ${m.location}</div><h1>${m.title}</h1><div class="subtitle">${m.challenges.length} challenges • Reward: ${m.reward}</div></div><div class="dashboard"><div class="metric"><span>Mission</span><strong>${p}%</strong></div><div class="metric"><span>Overall</span><strong>${overall()}%</strong></div></div><div class="progress-card"><div class="progress-head"><strong>${p}% complete</strong><span>${n} / ${m.challenges.length}</span></div><div class="track"><div class="fill" style="width:${p}%"></div></div></div><div class="search-wrap"><input class="search" id="search" placeholder="Search challenges, checkpoints, tags…" value="${S.q}"></div><div class="toolbar"><div class="section-label">Challenges</div><button id="toggle">${S.show?'Hide completed':'Show completed'}</button></div><div class="list">${f.map(c=>card(m,c)).join('')}</div><div class="empty" style="display:${f.length?'none':'block'}">No visible challenges.</div><div class="notes"><div class="notes-title">MISSION NOTES</div>${m.notes.map(n=>`<div class="note">• ${n}</div>`).join('')}</div><div id="toast" class="toast"></div>`}
function toast(x){const e=$('#toast');e.textContent=x;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1500)}function bind(){$$('[data-mission]').forEach(b=>b.onclick=()=>{S.active=b.dataset.mission;localStorage.setItem(P+'active',S.active);S.q='';render()});$$('[data-challenge]').forEach(c=>c.onchange=()=>{const m=mission();set(m.id,c.dataset.challenge,c.checked);render();toast(c.checked?'Completed — hides in one minute':'Marked incomplete')});$('#toggle').onclick=()=>{S.show=!S.show;localStorage.setItem(P+'show',S.show?'1':'0');render()};$('#search').oninput=e=>{S.q=e.target.value;render();const i=$('#search');i.focus();i.setSelectionRange(S.q.length,S.q.length)};$('#reset').onclick=()=>{if(confirm('Reset all saved progress?')){Object.keys(localStorage).filter(x=>x.startsWith(P)).forEach(x=>localStorage.removeItem(x));S.active=DATA.missions[0].id;S.show=false;S.q='';render()}}}function schedule(){S.timers.forEach(clearTimeout);S.timers.clear();if(S.show)return;const m=mission();m.challenges.forEach(c=>{if(!done(m.id,c.id))return;const r=H-(Date.now()-at(m.id,c.id));if(r>0)S.timers.set(c.id,setTimeout(render,r+50))})}function render(){$('#app').innerHTML=html();bind();schedule()}render();
</script>
</body>
</html>
